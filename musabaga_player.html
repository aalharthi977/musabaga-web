<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إعادة تشغيل اللعبة</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body {
            margin: 0;
            font-family: "Tahoma", Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        h1 {
            font-size: 28px;
            margin-bottom: 20px;
        }

        p {
            font-size: 20px;
            color: #cbd5f5;
        }

        .time {
            margin-top: 20px;
            font-size: 26px;
            font-weight: bold;
            color: #38bdf8;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚧 سيتم إعادة تشغيل اللعبة قريبًا</h1>
        <p>نعتذر عن الإزعاج</p>
        <div class="time">غدًا الساعة 8:00 مساءً</div>
    </div>

</body>
</html>
