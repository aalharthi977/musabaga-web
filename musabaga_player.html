<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ليدي ماتشا 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff0f6;--panel:#fce4ec;--card:#ffffff;
  --gold:#d63384;--gold2:#c2185b;--gold3:#f8bbd0;
  --correct:#2e7d32;--wrong:#c62828;
  --text:#3d0020;--muted:#a06080;--border:#f8bbd0;
  --A:#e91e8c;--B:#9c27b0;--C:#f06292;--D:#26a69a;
}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:'Tajawal',sans-serif;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(240,192,64,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(240,192,64,.03) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;z-index:0}

#app{position:relative;z-index:1;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:20px 16px}

/* ── JOIN SCREEN ── */
.join-card{background:#fff;border:2px solid #f8bbd0;
  border-radius:24px;padding:32px 28px;width:100%;max-width:400px;
  text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.join-logo{font-size:48px;margin-bottom:12px}
.join-title{font-size:28px;font-weight:900;color:#c2185b;
  background:linear-gradient(135deg,var(--gold2),var(--gold3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:6px}
.join-sub{color:#a06080;font-size:14px;margin-bottom:28px}
.input-field{width:100%;padding:14px 18px;
  background:#fff5f8;border:1.5px solid #f48fb1;
  border-radius:14px;color:var(--text);font-size:18px;font-weight:700;
  font-family:'Tajawal',sans-serif;text-align:center;
  outline:none;transition:border-color .2s;margin-bottom:12px;direction:ltr}
.input-field:focus{border-color:#e91e8c}
.input-field::placeholder{color:var(--muted);font-weight:400;direction:rtl}
.btn-join{width:100%;padding:16px;border-radius:50px;border:none;
  background:linear-gradient(135deg,#c2185b,#e91e8c);color:#fff;
  color:#0b0f1a;font-size:19px;font-weight:900;
  cursor:pointer;font-family:'Tajawal',sans-serif;
  transition:all .25s;box-shadow:0 4px 20px rgba(240,192,64,.35);margin-top:4px}
.btn-join:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(240,192,64,.5)}
.btn-join:disabled{opacity:.5;cursor:default;transform:none}
.err{color:var(--wrong);font-size:13px;margin-top:8px}

/* ── WAITING ── */
.waiting-screen{text-align:center;padding:20px;color:var(--text)}
.waiting-avatar{width:90px;height:90px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:42px;margin:0 auto 16px;
  box-shadow:0 0 30px rgba(240,192,64,.2)}
.waiting-name{font-size:26px;font-weight:900;margin-bottom:8px}
.waiting-score{font-size:18px;color:var(--gold);font-weight:700;margin-bottom:6px}
.waiting-rank{color:var(--muted);font-size:14px;margin-bottom:24px}
.pulse-ring{display:inline-flex;align-items:center;justify-content:center;
  width:60px;height:60px;border-radius:50%;position:relative}
.pulse-ring::before{content:'';position:absolute;inset:0;border-radius:50%;
  border:2px solid var(--gold);animation:pulseRing 1.5s ease-in-out infinite}
.pulse-ring::after{content:'';position:absolute;inset:8px;border-radius:50%;
  border:2px solid rgba(240,192,64,.4);animation:pulseRing 1.5s ease-in-out .5s infinite}
@keyframes pulseRing{0%{transform:scale(1);opacity:1}100%{transform:scale(1.6);opacity:0}}
.hourglass{font-size:28px;animation:spin 2s linear infinite}
@keyframes spin{0%,100%{transform:rotate(0)}50%{transform:rotate(180deg)}}

/* ── QUESTION SCREEN ── */
.q-screen{width:100%;max-width:460px}
.q-header{display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px}
.q-cat{background:#fce4ec;color:#c2185b;
  border:1px solid rgba(240,192,64,.3);padding:4px 12px;
  border-radius:20px;font-size:12px;font-weight:700}
.timer-bar-wrap{height:6px;background:#f8bbd0;border-radius:3px;
  margin-bottom:16px;overflow:hidden}
.timer-bar{height:100%;border-radius:3px;
  background:linear-gradient(90deg,#e91e8c,#c2185b);
  transition:width .9s linear,background .5s;width:100%}
.timer-bar.urgent{background:linear-gradient(90deg,var(--wrong),#f97316)}
.q-text-card{background:#fff;border:1px solid #f8bbd0;
  border-radius:18px;padding:20px;margin-bottom:16px;
  font-size:clamp(16px,4vw,20px);font-weight:700;line-height:1.5;
  text-align:center}
.opts-player{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opt-player{padding:18px 14px;border-radius:16px;border:2.5px solid transparent;
  font-size:clamp(14px,4vw,17px);font-weight:700;
  cursor:pointer;font-family:'Tajawal',sans-serif;
  transition:all .2s;text-align:center;color:#fff;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  user-select:none;-webkit-tap-highlight-color:transparent}
.opt-player:active{transform:scale(.96)}
.opt-player[data-i="0"]{background:var(--A);box-shadow:0 4px 16px rgba(245,158,11,.3)}
.opt-player[data-i="1"]{background:var(--B);box-shadow:0 4px 16px rgba(59,130,246,.3)}
.opt-player[data-i="2"]{background:var(--C);box-shadow:0 4px 16px rgba(236,72,153,.3)}
.opt-player[data-i="3"]{background:var(--D);box-shadow:0 4px 16px rgba(16,185,129,.3)}
.opt-player .opt-ltr{font-size:22px;font-weight:900;opacity:.85}
.opt-player.picked{transform:scale(.97);filter:brightness(.8)}
.opt-player.correct-ans{animation:correctFlash .6s ease;border-color:#fff}
.opt-player.wrong-ans{opacity:.35}
@keyframes correctFlash{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.opt-player:disabled,.opt-player[disabled]{cursor:default;pointer-events:none}

/* answered state */
.answered-msg{text-align:center;padding:24px;
  display:flex;flex-direction:column;align-items:center;gap:12px}
.answered-icon{font-size:56px;animation:pop .4s cubic-bezier(.34,1.56,.64,1);display:block}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
.answered-text{font-size:18px;font-weight:700;color:var(--text)}
.answered-pts{font-size:28px;font-weight:900;color:var(--gold)}

/* score bar */
.score-bar{display:flex;align-items:center;justify-content:space-between;
  background:#fce4ec;border:1px solid #f8bbd0;
  border-radius:14px;padding:12px 16px;margin-bottom:14px}
.score-bar .name{font-weight:700;font-size:15px}
.score-bar .pts{font-size:20px;font-weight:900;color:#e91e8c}

/* final */
.final-screen{text-align:center;padding:20px}
.my-rank{font-size:72px;animation:pop .6s cubic-bezier(.34,1.56,.64,1)}
.my-rank-label{font-size:22px;font-weight:900;margin-bottom:6px;
  background:linear-gradient(135deg,#c2185b,#f48fb1);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.my-final-score{font-size:40px;font-weight:900;color:#e91e8c;margin-bottom:8px}
.my-final-sub{color:var(--muted);font-size:15px}

  /* ── LIVE PLAYERS PANEL ── */
  .live-panel {
    width:100%;max-width:460px;
    background:rgba(252,228,236,.7);
    border:1px solid var(--border);
    border-radius:14px;padding:12px 14px;
    margin-bottom:12px;
  }
  .live-panel-title {
    font-size:10px;text-transform:uppercase;letter-spacing:2px;
    color:var(--muted);margin-bottom:10px;text-align:center;
  }
  .live-players-row {
    display:flex;flex-direction:column;gap:6px;
  }
  .live-player-item {
    display:flex;align-items:center;gap:8px;
    padding:7px 10px;border-radius:10px;
    background:#fff;border:1px solid #f8bbd0;
    transition:all .3s;
  }
  .live-player-item.me {
    background:rgba(240,192,64,.08);
    border:1px solid rgba(240,192,64,.2);
  }
  .live-player-avatar {
    width:28px;height:28px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:14px;flex-shrink:0;
  }
  .live-player-name {
    flex:1;font-size:13px;font-weight:700;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .live-player-score {
    font-size:12px;font-weight:700;color:#e91e8c;
    min-width:48px;text-align:left;
  }
  .live-answered-dot {
    width:10px;height:10px;border-radius:50%;flex-shrink:0;
    background:var(--border);transition:all .3s;
  }
  .live-answered-dot.done {
    background:var(--correct);
    box-shadow:0 0 6px var(--correct);
  }
  .live-answered-dot.pending {
    background:var(--border);
    animation:pendingPulse 1.5s ease-in-out infinite;
  }
  @keyframes pendingPulse {
    0%,100%{opacity:.4} 50%{opacity:1}
  }

@keyframes pulseDot { 0%,100%{transform:scale(1);opacity:.6} 50%{transform:scale(1.4);opacity:1} }
</style>
</head>
<body>
<div id="app">
  <div id="app-init" style="text-align:center;padding:40px;color:#8a8fa8">
    <div style="font-size:36px;margin-bottom:12px">⏳</div>
    <div style="font-size:15px">جاري الاتصال…</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update, off }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC2wt2f_viYnxS54f-CAPwIgyJlfzzjT9Q",
  authDomain: "musabaga-b771f.firebaseapp.com",
  projectId: "musabaga-b771f",
  databaseURL: "https://musabaga-b771f-default-rtdb.firebaseio.com",
  storageBucket: "musabaga-b771f.firebasestorage.app",
  messagingSenderId: "357920865302",
  appId: "1:357920865302:web:b2fc24cb3b89920da24937"
};

const fApp = initializeApp(firebaseConfig);
const db = getDatabase(fApp);

const AVATARS = ['🦁','🐯','🦊','🐼','🦅','🦋','🐉','🦄','🐺','🦈','🎯','🔥'];
const COLORS  = ['#f59e0b','#3b82f6','#ec4899','#10b981','#8b5cf6','#ef4444','#06b6d4','#f97316'];

let roomCode = '';
let playerId = '';
let playerName = '';
let playerAvatar = '';
let playerColor = '';
let myScore = 0;
let currentQIdx = -1;
let hasAnswered = false;
let myPickedAnswer = -1;
let timerInterval = null;
let qStartedAt = 0;
let qTimeLimit = 10;
let allPlayers = {};
let currentAnswers = {};


// Always use activeRoom from Firebase — no URL room code needed
initPlayer();

async function initPlayer() {
  const snap = await get(ref(db, 'activeRoom'));
  if (!snap.exists() || !snap.val()) {
    showNoGame();
    watchActiveRoom();
    return;
  }
  roomCode = snap.val();
  const roomSnap = await get(ref(db, `rooms/${roomCode}`));
  if (!roomSnap.exists()) { showNoGame(); watchActiveRoom(); return; }
  const data = roomSnap.val();
  if (data.phase === 'lobby') {
    showJoinForm();
  } else if (data.phase === 'final' || data.phase === 'ended') {
    showNoGame();
    watchActiveRoom();
  } else {
    showGameRunning();
    watchActiveRoom();
  }
}

function watchActiveRoom() {
  onValue(ref(db, 'activeRoom'), async snap => {
    if (!snap.exists() || !snap.val()) return;
    const newRoom = snap.val();
    if (newRoom === roomCode) return;
    roomCode = newRoom;
    // new room created — reload join form
    const roomSnap = await get(ref(db, `rooms/${roomCode}`));
    if (!roomSnap.exists()) return;
    const data = roomSnap.val();
    if (data.phase === 'lobby') {
      showJoinForm();
    }
  });
}

function showJoinForm() {
  document.getElementById('app').innerHTML = `
    <div class="join-card">
      <div class="join-logo">🌸</div>
      <div class="join-title">مسابقة ليدي ماتشا للعيد</div>
      <div class="join-sub" style="line-height:1.7;margin-bottom:16px">
        مسابقة ترفيهية ممتعة! أجب على الأسئلة بأسرع وقت ممكن وتصدّر لوحة النتائج 🏆<br>
        <span style="font-size:12px;opacity:.8">اللي يجيب صح وأسرع يأخذ نقاط أكثر ⚡</span>
      </div>
      <input class="input-field" id="inp-name" placeholder="اسمك" maxlength="20"
        onkeydown="if(event.key==='Enter')window.joinRoom()">
      <button class="btn-join" onclick="window.joinRoom()">انضم الآن 🌸</button>
      <div class="err" id="join-err"></div>
    </div>
  `;
}

function showNoGame() {
  document.getElementById('app').innerHTML = `
    <div class="join-card">
      <div class="join-logo">🕐</div>
      <div class="join-title">لا توجد مسابقة الآن</div>
      <div class="join-sub">انتظر المضيف ليفتح جلسة جديدة — سيتم تحويلك تلقائياً</div>
      <div style="margin-top:20px;display:flex;align-items:center;justify-content:center;gap:8px">
        <div style="width:8px;height:8px;border-radius:50%;background:var(--gold);animation:pulseDot 1s ease-in-out infinite"></div>
        <div style="width:8px;height:8px;border-radius:50%;background:var(--gold);animation:pulseDot 1s ease-in-out .3s infinite"></div>
        <div style="width:8px;height:8px;border-radius:50%;background:var(--gold);animation:pulseDot 1s ease-in-out .6s infinite"></div>
      </div>
    </div>
  `;
}

window.joinRoom = async function() {
  const nameInp = document.getElementById('inp-name');
  if (!nameInp) return;
  const name = nameInp.value.trim();
  const errEl = document.getElementById('join-err');
  if (errEl) errEl.textContent = '';
  if (!name) { if(errEl) errEl.textContent = 'أدخل اسمك'; return; }
  if (!roomCode) { if(errEl) errEl.textContent = 'لا توجد غرفة نشطة'; return; }

  const roomSnap = await get(ref(db, `rooms/${roomCode}`));
  if (!roomSnap.exists()) { if(errEl) errEl.textContent = 'الغرفة غير موجودة'; return; }
  const roomData = roomSnap.val();
  if (roomData.phase !== 'lobby') {
    showGameRunning();
    watchActiveRoom();
    return;
  }
  const nameInpVal = name;

  playerName = nameInpVal;
  playerId = 'p_' + Date.now() + '_' + Math.random().toString(36).substring(2,6);
  playerAvatar = AVATARS[Math.floor(Math.random() * AVATARS.length)];
  playerColor = COLORS[Math.floor(Math.random() * COLORS.length)];
  myScore = 0;

  await set(ref(db, `rooms/${roomCode}/players/${playerId}`), {
    name: playerName, avatar: playerAvatar, color: playerColor, score: 0, joinedAt: Date.now()
  });

  listenRoom();
  showWaiting();
}

function showGameRunning() {
  document.getElementById('app').innerHTML = `
    <div class="join-card">
      <div class="join-logo">⏳</div>
      <div class="join-title">اللعبة جارية!</div>
      <div class="join-sub">انتظر انتهاء الجلسة الحالية وسيتم تحويلك تلقائياً للجلسة القادمة</div>
      <div style="margin-top:20px;display:flex;align-items:center;justify-content:center;gap:8px">
        <div style="width:8px;height:8px;border-radius:50%;background:var(--gold);animation:pulseDot 1s ease-in-out infinite"></div>
        <div style="width:8px;height:8px;border-radius:50%;background:var(--gold);animation:pulseDot 1s ease-in-out .3s infinite"></div>
        <div style="width:8px;height:8px;border-radius:50%;background:var(--gold);animation:pulseDot 1s ease-in-out .6s infinite"></div>
      </div>
    </div>
  `;
}

function listenForNextRoom() {
  watchActiveRoom();
}

function showWaiting() {
  const shareUrl = location.href.split('?')[0];
  document.getElementById('app').innerHTML = `
    <div class="waiting-screen">
      <div class="waiting-avatar" style="background:${playerColor}">${playerAvatar}</div>
      <div class="waiting-name">${playerName}</div>
      <div style="color:var(--muted);font-size:13px;margin-bottom:12px">في انتظار انضمام اللاعبين الآخرين…</div>

      <!-- Share link -->
      <div class="live-panel" style="max-width:320px;margin-bottom:12px;text-align:center">
        <div class="live-panel-title" style="margin-bottom:8px">📢 ادعُ أصدقاءك</div>
        <div style="font-size:12px;color:var(--muted);word-break:break-all;margin-bottom:8px">${shareUrl}</div>
        <button onclick="navigator.clipboard.writeText('${shareUrl}').then(()=>this.textContent='✅ تم النسخ!').catch(()=>{})"
          style="background:linear-gradient(135deg,#c2185b,#e91e8c);color:#fff;border:none;padding:8px 20px;border-radius:50px;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;cursor:pointer">
          📋 نسخ رابط الدعوة
        </button>
      </div>

      <div class="live-panel" style="max-width:320px">
        <div class="live-panel-title">
          اللاعبون <span id="waiting-count" style="color:var(--gold)">0 لاعب</span>
        </div>
        <div class="live-players-row" id="waiting-players-list"></div>
      </div>
      <div class="pulse-ring" style="margin-top:8px"><span class="hourglass">⏳</span></div>
      <div style="margin-top:12px;color:var(--muted);font-size:13px">تبدأ اللعبة تلقائياً عند اكتمال العدد 🌸</div>
    </div>
  `;
  renderWaitingPlayers();
}

function listenRoom() {
  onValue(ref(db, `rooms/${roomCode}`), snap => {
    if (!snap.exists()) return;
    const data = snap.val();
    const q = data.currentQ;

    if (data.phase === 'question') {
      if (q !== undefined && q !== currentQIdx) {
        currentQIdx = q;
        hasAnswered = false;
        myPickedAnswer = -1;
        loadQuestion(q);
      }
    } else if (data.phase === 'reveal') {
      showRevealOnPlayer();
    } else if (data.phase === 'final') {
      showFinal();
    } else if (data.phase === 'ended') {
      document.getElementById('app').innerHTML = `
        <div style="text-align:center;padding:40px;color:#8a8fa8">
          <div style="font-size:48px;margin-bottom:16px">🏁</div>
          <div style="font-size:20px;font-weight:700;color:#f0ede4">انتهت المسابقة</div>
        </div>`;
    }
    // watchActiveRoom handles new room detection
  });

  // listen to ALL players (for waiting room + live scoreboard)
  onValue(ref(db, `rooms/${roomCode}/players`), snap => {
    allPlayers = snap.val() || {};
    // update my score
    if (allPlayers[playerId]) myScore = allPlayers[playerId].score || 0;
    // refresh whatever is currently showing
    refreshLivePanel();
    if (document.getElementById('waiting-players-list')) renderWaitingPlayers();
  });

  // listen to current question answers (who picked)
  onValue(ref(db, `rooms/${roomCode}/answers`), snap => {
    const all = snap.val() || {};
    currentAnswers = all[currentQIdx] || {};
    refreshLivePanel();
  });
}

function renderWaitingPlayers() {
  const el = document.getElementById('waiting-players-list');
  if (!el) return;
  const players = Object.entries(allPlayers).sort((a,b) => (a[1].joinedAt||0)-(b[1].joinedAt||0));
  el.innerHTML = players.map(([id, p]) => `
    <div class="live-player-item ${id===playerId?'me':''}">
      <div class="live-player-avatar" style="background:${p.color||'#555'}">${p.avatar||'👤'}</div>
      <div class="live-player-name">${p.name}${id===playerId?' (أنت)':''}</div>
    </div>
  `).join('');
  const countEl = document.getElementById('waiting-count');
  if (countEl) countEl.textContent = players.length + ' لاعب';
}

function refreshLivePanel() {
  const panel = document.getElementById('live-players-panel');
  if (!panel) return;
  const players = Object.entries(allPlayers)
    .sort((a,b) => (b[1].score||0)-(a[1].score||0));
  panel.innerHTML = players.map(([id, p]) => {
    const answered = !!currentAnswers[id];
    return `
      <div class="live-player-item ${id===playerId?'me':''}">
        <div class="live-player-avatar" style="background:${p.color||'#555'}">${p.avatar||'👤'}</div>
        <div class="live-player-name">${p.name}${id===playerId?' ✦':''}</div>
        <div class="live-player-score">${p.score||0} نقطة</div>
        <div class="live-answered-dot ${answered?'done':'pending'}" title="${answered?'أجاب':'لم يجب بعد'}"></div>
      </div>`;
  }).join('');
}

async function showRevealOnPlayer() {
  clearInterval(timerInterval);
  // get correct answer from firebase
  const snap = await get(ref(db, `rooms/${roomCode}/currentQuestion`));
  if (!snap.exists()) return;
  const correctAnswer = snap.val().correctAnswer;
  const opts = Array.isArray(snap.val().options) ? snap.val().options : Object.values(snap.val().options);
  const letters = ['أ','ب','ج','د'];

  const isCorrect = hasAnswered && myPickedAnswer === correctAnswer;
  const didAnswer = hasAnswered && myPickedAnswer >= 0;

  // award points display
  const ptsSnap = await get(ref(db, `rooms/${roomCode}/players/${playerId}/score`));
  myScore = ptsSnap.exists() ? ptsSnap.val() : myScore;

  document.getElementById('app').innerHTML = `
    <div class="q-screen">
      <div class="score-bar">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:28px;height:28px;border-radius:50%;background:${playerColor};display:flex;align-items:center;justify-content:center;font-size:14px">${playerAvatar}</div>
          <div class="name">${playerName}</div>
        </div>
        <div class="pts">${myScore} نقطة</div>
      </div>
      <div style="text-align:center;padding:16px 0 8px">
        <div style="font-size:52px;animation:pop .4s cubic-bezier(.34,1.56,.64,1)">
          ${!didAnswer ? '⏰' : isCorrect ? '🎉' : '❌'}
        </div>
        <div style="font-size:17px;font-weight:700;margin-top:8px;color:${!didAnswer?'#8a8fa8':isCorrect?'#22c55e':'#ef4444'}">
          ${!didAnswer ? 'انتهى الوقت!' : isCorrect ? 'إجابة صحيحة! +نقاط 🎯' : 'إجابة خاطئة'}
        </div>
      </div>
      <div class="opts-player" style="pointer-events:none">
        ${opts.map((opt,i) => {
          let cls = 'opt-player';
          let style = '';
          if (i === correctAnswer) {
            style = 'background:#16a34a;border:2px solid #22c55e;';
          } else if (i === myPickedAnswer && i !== correctAnswer) {
            style = 'background:#7f1d1d;border:2px solid #ef4444;opacity:.7;';
          } else {
            style = 'opacity:.35;';
          }
          return `<button class="${cls}" data-i="${i}" disabled style="${style}">
            <span class="opt-ltr">${letters[i]}</span>
            <span>${opt}</span>
            ${i === correctAnswer ? '<span style="font-size:18px">✓</span>' : ''}
          </button>`;
        }).join('')}
      </div>
      <div style="text-align:center;color:#8a8fa8;font-size:13px;margin-top:12px">انتظر السؤال التالي…</div>
    </div>
  `;
}

async function loadQuestion(idx) {
  // retry up to 5 times with 300ms delay to handle timing
  let snap = null;
  for (let attempt = 0; attempt < 5; attempt++) {
    snap = await get(ref(db, `rooms/${roomCode}/currentQuestion`));
    if (snap.exists() && snap.val().idx === idx) break;
    await new Promise(r => setTimeout(r, 300));
  }
  if (!snap || !snap.exists()) return;
  const q = snap.val();
  qStartedAt = q.startedAt;
  qTimeLimit = q.timeLimit || 20;
  renderQuestion(q, idx);
}

function renderQuestion(q, idx) {
  const letters = ['أ','ب','ج','د'];
  const opts = Array.isArray(q.options) ? q.options : Object.values(q.options);
  document.getElementById('app').innerHTML = `
    <div class="q-screen">
      <div class="score-bar">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:28px;height:28px;border-radius:50%;background:${playerColor};display:flex;align-items:center;justify-content:center;font-size:14px">${playerAvatar}</div>
          <div class="name">${playerName}</div>
        </div>
        <div class="pts">${myScore} نقطة</div>
      </div>
      <div class="q-header">
        <span class="q-cat">${q.cat||''}</span>
        <span style="color:var(--muted);font-size:13px">س ${idx+1}</span>
      </div>
      <div class="timer-bar-wrap"><div class="timer-bar" id="timer-bar"></div></div>
      <div class="q-text-card">${q.text}</div>
      <div class="opts-player" id="opts-player">
        ${opts.map((opt,i)=>`
          <button class="opt-player" data-i="${i}" onclick="pickAnswer(${i})">
            <span class="opt-ltr">${letters[i]}</span>
            <span>${opt}</span>
          </button>`).join('')}
      </div>
      <div class="live-panel" style="margin-top:12px">
        <div class="live-panel-title">النتائج المباشرة</div>
        <div class="live-players-row" id="live-players-panel"></div>
      </div>
    </div>
  `;
  startPlayerTimer();
  refreshLivePanel();
}

function startPlayerTimer() {
  clearInterval(timerInterval);
  const bar = document.getElementById('timer-bar');
  timerInterval = setInterval(() => {
    const elapsed = (Date.now() - qStartedAt) / 1000;
    const pct = Math.max(0, 1 - elapsed / qTimeLimit);
    if (bar) {
      bar.style.width = (pct * 100) + '%';
      if (pct < 0.3) bar.classList.add('urgent');
    }
    if (pct <= 0) {
      clearInterval(timerInterval);
      if (!hasAnswered) disableOptions();
    }
  }, 100);
}

window.pickAnswer = async function(i) {
  if (hasAnswered) return;
  hasAnswered = true;
  myPickedAnswer = i;
  clearInterval(timerInterval);
  const timeTaken = (Date.now() - qStartedAt) / 1000;

  // visual feedback immediately
  document.querySelectorAll('.opt-player').forEach(b => {
    b.setAttribute('disabled','');
    if (parseInt(b.dataset.i) === i) b.classList.add('picked');
  });

  await set(ref(db, `rooms/${roomCode}/answers/${currentQIdx}/${playerId}`), {
    answer: i, timeTaken, answeredAt: Date.now()
  });

  // show waiting state
  document.getElementById('app').innerHTML = `
    <div class="answered-msg">
      <div class="answered-icon" style="font-size:48px">⏳</div>
      <div class="answered-text">اخترت ${['أ','ب','ج','د'][i]} — انتظر النتيجة…</div>
      <div class="score-bar" style="width:280px;margin-top:16px">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:28px;height:28px;border-radius:50%;background:${playerColor};display:flex;align-items:center;justify-content:center">${playerAvatar}</div>
          <div>${playerName}</div>
        </div>
        <div class="pts">${myScore}</div>
      </div>
      <div class="live-panel" style="max-width:320px;margin-top:16px">
        <div class="live-panel-title">من أجاب؟</div>
        <div class="live-players-row" id="live-players-panel"></div>
      </div>
    </div>
  `;
  refreshLivePanel();
};

function disableOptions() {
  document.querySelectorAll('.opt-player').forEach(b => b.setAttribute('disabled',''));
}

function showWaitingReveal() {
  if (hasAnswered) return;
  document.getElementById('app').innerHTML = `
    <div class="answered-msg">
      <div class="answered-icon">⏰</div>
      <div class="answered-text">انتهى الوقت!</div>
    </div>
  `;
}

async function showFinal() {
  clearInterval(timerInterval);
  const snap = await get(ref(db, `rooms/${roomCode}/players`));
  const players = Object.entries(snap.val()||{})
    .map(([id,p])=>({...p,id}))
    .sort((a,b)=>(b.score||0)-(a.score||0));
  const myRank = players.findIndex(p=>p.id===playerId)+1;
  const total = players.length;
  const rankEmoji = myRank===1?'🥇':myRank===2?'🥈':myRank===3?'🥉':'🎖️';

  document.getElementById('app').innerHTML = `
    <div class="final-screen">
      <div class="my-rank">${rankEmoji}</div>
      <div class="my-rank-label">المركز ${myRank} من ${total}</div>
      <div class="my-final-score">${myScore} نقطة</div>
      <div class="my-final-sub">${playerName}</div>
      <div style="margin-top:28px;color:var(--muted);font-size:14px">شكراً على المشاركة! 🎉</div>
    </div>
  `;
}
</script>
</body>
</html>
