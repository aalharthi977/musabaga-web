<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مسابقة — شاشة المضيف</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0f1a;--panel:#131929;--card:#1a2236;
  --gold:#f0c040;--gold2:#e8a820;--gold3:#fde080;
  --correct:#22c55e;--wrong:#ef4444;--blue:#3b82f6;
  --text:#f0ede4;--muted:#8a8fa8;--border:#2a3050;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Tajawal',sans-serif;overflow:hidden}

/* bg grid */
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(240,192,64,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(240,192,64,0.03) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;z-index:0}

#app{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column}

/* ── TOP BAR ── */
.top-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 24px;
  background:var(--panel);border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.top-logo{font-size:20px;font-weight:900;
  background:linear-gradient(135deg,var(--gold2),var(--gold),var(--gold3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.top-stats{display:flex;gap:16px;align-items:center}
.stat-chip{display:flex;flex-direction:column;align-items:center;
  background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:6px 14px;min-width:70px}
.stat-chip .val{font-size:20px;font-weight:900;color:var(--gold);line-height:1}
.stat-chip .lbl{font-size:10px;color:var(--muted);margin-top:2px}
.top-controls{display:flex;gap:8px}

/* ── MAIN ── */
.main{flex:1;display:grid;grid-template-columns:1fr 280px;gap:0;overflow:hidden}

/* ── LEFT — question area ── */
.q-area{display:flex;flex-direction:column;padding:20px 24px;overflow-y:auto}

/* state screens */
.state-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;text-align:center}
.big-icon{font-size:72px;animation:pop .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
.state-title{font-size:32px;font-weight:900;color:var(--gold)}
.state-sub{color:var(--muted);font-size:16px;max-width:500px;line-height:1.6}
#qr-wrap{background:white;border-radius:16px;padding:16px;display:inline-block}
.join-url{font-size:13px;color:var(--muted);word-break:break-all;max-width:400px}
.room-code-big{font-size:56px;font-weight:900;letter-spacing:8px;
  background:linear-gradient(135deg,var(--gold),var(--gold3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* question card */
.q-card{background:var(--card);border:1px solid var(--border);
  border-radius:20px;padding:24px 28px;margin-bottom:18px;
  position:relative;overflow:hidden}
.q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.q-meta{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.q-cat-tag{background:rgba(240,192,64,.12);color:var(--gold);
  border:1px solid rgba(240,192,64,.3);padding:4px 14px;
  border-radius:20px;font-size:12px;font-weight:700}
.q-num{color:var(--muted);font-size:13px;margin-right:auto}
.q-text{font-size:clamp(18px,2.5vw,26px);font-weight:700;line-height:1.5;color:var(--text)}

/* timer ring */
.timer-wrap{display:flex;justify-content:center;margin-bottom:16px}
.timer-ring{position:relative;width:80px;height:80px}
.timer-ring svg{transform:rotate(-90deg)}
.timer-ring .bg{stroke:var(--border);fill:none}
.timer-ring .fill{fill:none;stroke:var(--gold);stroke-linecap:round;
  transition:stroke-dashoffset .9s linear,stroke .5s}
.timer-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:900;color:var(--gold)}

/* options grid */
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.opt-bar{display:flex;align-items:center;gap:12px;
  background:rgba(255,255,255,.04);border:1.5px solid var(--border);
  border-radius:14px;padding:14px 16px;
  transition:all .4s;position:relative;overflow:hidden}
.opt-bar .fill-bg{position:absolute;right:0;top:0;bottom:0;
  border-radius:14px;transition:width .8s ease;opacity:.18}
.opt-bar.correct{border-color:var(--correct);background:rgba(34,197,94,.12)}
.opt-bar.correct .fill-bg{background:var(--correct);width:100%!important}
.opt-bar.wrong{border-color:var(--wrong);background:rgba(239,68,68,.1);opacity:.55}
.opt-letter{width:32px;height:32px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:900;
  background:rgba(240,192,64,.15);color:var(--gold);
  border:1px solid rgba(240,192,64,.3);z-index:1}
.opt-text{font-size:15px;font-weight:500;flex:1;z-index:1}
.opt-count{font-size:13px;font-weight:700;color:var(--muted);z-index:1;white-space:nowrap}
.opt-bar.correct .opt-count{color:var(--correct)}

/* results reveal */
.results-row{display:flex;gap:8px;align-items:center;
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:14px 18px;margin-bottom:12px}
.results-row .rank{font-size:20px;width:36px;text-align:center}
.results-row .p-name{flex:1;font-size:16px;font-weight:700}
.results-row .p-score{font-size:18px;font-weight:900;color:var(--gold)}
.results-row .p-gain{font-size:12px;color:var(--correct);margin-right:4px}
.results-row:first-child{border-color:var(--gold);background:rgba(240,192,64,.06)}
.results-row:nth-child(2){border-color:rgba(192,192,192,.4)}
.results-row:nth-child(3){border-color:rgba(205,127,50,.4)}

/* ── RIGHT — leaderboard ── */
.sidebar{background:var(--panel);border-right:1px solid var(--border);
  display:flex;flex-direction:column;padding:16px 14px;overflow:hidden}
.sidebar-title{font-size:11px;text-transform:uppercase;letter-spacing:2px;
  color:var(--muted);margin-bottom:12px;text-align:center}
.players-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:5px;
  scrollbar-width:none}
.player-row{display:flex;align-items:center;gap:8px;
  padding:8px 10px;border-radius:10px;
  background:var(--card);border:1px solid transparent;
  transition:all .3s;animation:slideIn .3s ease}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.player-row.active{border-color:rgba(240,192,64,.3);background:rgba(240,192,64,.07)}
.p-rank{font-size:11px;color:var(--muted);width:16px;text-align:center}
.p-avatar{width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:900;flex-shrink:0}
.p-info{flex:1;min-width:0}
.p-info .name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-info .score{font-size:11px;color:var(--gold)}
.p-answered{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--border)}
.p-answered.yes{background:var(--correct);box-shadow:0 0 6px var(--correct)}
.answered-count{text-align:center;padding:10px;
  font-size:13px;color:var(--muted);border-top:1px solid var(--border);margin-top:8px}

/* ── BUTTONS ── */
.btn{padding:10px 22px;border-radius:50px;border:none;cursor:pointer;
  font-family:'Tajawal',sans-serif;font-size:15px;font-weight:700;transition:all .2s}
.btn-gold{background:linear-gradient(135deg,var(--gold2),var(--gold));color:#0b0f1a;
  box-shadow:0 4px 16px rgba(240,192,64,.3)}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(240,192,64,.45)}
.btn-outline{background:transparent;color:var(--text);border:1.5px solid var(--border)}
.btn-outline:hover{border-color:rgba(240,192,64,.5);color:var(--gold)}
.btn-green{background:linear-gradient(135deg,#16a34a,#22c55e);color:#fff}
.btn-green:hover{transform:translateY(-2px)}
.btn-red{background:rgba(239,68,68,.15);color:var(--wrong);border:1.5px solid rgba(239,68,68,.3)}
.btns-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:16px}

/* phase label */
.phase-badge{display:inline-flex;align-items:center;gap:6px;
  padding:4px 14px;border-radius:20px;font-size:12px;font-weight:700;
  background:rgba(240,192,64,.12);color:var(--gold);
  border:1px solid rgba(240,192,64,.3);margin-bottom:12px}

/* final podium */
.podium{display:flex;align-items:flex-end;justify-content:center;gap:12px;margin:24px 0}
.podium-block{display:flex;flex-direction:column;align-items:center;gap:8px}
.podium-avatar{width:56px;height:56px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900}
.podium-name{font-size:13px;font-weight:700;text-align:center}
.podium-score{font-size:12px;color:var(--gold)}
.podium-stand{border-radius:8px 8px 0 0;width:80px;display:flex;align-items:center;justify-content:center;
  font-size:24px;font-weight:900;color:rgba(255,255,255,.7)}
.podium-block:nth-child(1) .podium-stand{height:80px;background:linear-gradient(180deg,#c0c0c0,#a0a0a0)}
.podium-block:nth-child(2) .podium-stand{height:110px;background:linear-gradient(180deg,var(--gold),var(--gold2))}
.podium-block:nth-child(3) .podium-stand{height:60px;background:linear-gradient(180deg,#cd7f32,#a0622a)}

@media(max-width:700px){
  .main{grid-template-columns:1fr}
  .sidebar{display:none}
}
</style>
</head>
<body>
<div id="app">
  <div class="top-bar">
    <div class="top-logo">🎯 مسابقة — شاشة المضيف</div>
    <div class="top-stats">
      <div class="stat-chip"><div class="val" id="stat-players">0</div><div class="lbl">لاعب</div></div>
      <div class="stat-chip"><div class="val" id="stat-q">0/0</div><div class="lbl">سؤال</div></div>
    </div>
    <div class="top-controls">
      <button class="btn btn-red" onclick="endGame()" id="btn-end" style="display:none">⏹ إنهاء</button>
    </div>
  </div>

  <div class="main">
    <div class="q-area" id="q-area">
      <!-- dynamic content -->
    </div>
    <div class="sidebar">
      <div class="sidebar-title">المتسابقون</div>
      <div class="players-list" id="players-list"></div>
      <div class="answered-count" id="answered-count"></div>
    </div>
  </div>
</div>

// Global dispatcher - catches onclick calls and routes to module functions
const _Q = {};
window._registerFn = function(name, fn) { _Q[name] = fn; };
window.nextQuestion    = function() { _Q.nextQuestion    && _Q.nextQuestion();    };
window.finishGame      = function() { _Q.finishGame      && _Q.finishGame();      };
window.revealAnswer    = function() { _Q.revealAnswer    && _Q.revealAnswer();    };
window.startGame       = function() { _Q.startGame       && _Q.startGame();       };
window.endGame         = function() { _Q.endGame         && _Q.endGame();         };
window.copyLink        = function(u) { _Q.copyLink       && _Q.copyLink(u);       };
window.showLeaderboardScreen = function() { _Q.showLeaderboardScreen && _Q.showLeaderboardScreen(); };
</script>

  {c:"🌍 جغرافيا صعبة",q:"ما اسم الصحراء الموجودة في شبه الجزيرة العربية تحديداً داخل المملكة؟",o:["صحراء الدهناء فقط","الربع الخالي","صحراء النفود","الربع الخالي والنفود والدهناء"],a:3}
];

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

/* ════════════════════════════════════
   STATE
════════════════════════════════════ */
const TIMER_SECS = 10;
const POINTS_BASE = 1000;
const AVATARS = ['🦁','🐯','🦊','🐼','🦅','🦋','🐉','🦄','🐺','🦈','🦁','🐸'];
const COLORS = ['#f59e0b','#3b82f6','#ec4899','#10b981','#8b5cf6','#ef4444','#06b6d4','#f97316'];

let roomCode = '';
let autoStartCount = 0; // 0 = disabled
let gameQuestions = [];
let currentQ = -1;
let timerInterval = null;
let timerLeft = 0;
let phase = 'lobby'; // lobby | question | reveal | leaderboard | final
let playersCache = {};
let answersCache = {};
let unsubFns = [];

/* ════════════════════════════════════
   INIT
════════════════════════════════════ */
// All global functions defined first, then init
_registerFn('copyLink', function(url) {
  navigator.clipboard.writeText(url).then(() => alert('تم نسخ الرابط!'));
});

_registerFn('endGame', async function() {
  if (!confirm('هل تريد إنهاء المسابقة؟')) return;
  clearInterval(timerInterval);
  await update(ref(db, `rooms/${roomCode}`), { phase:'ended' });
  location.reload();
});

_registerFn('startGame', async function() {
  currentQ = 0;
  document.getElementById('btn-end').style.display = 'flex';
  document.getElementById('stat-q').textContent = `1/${gameQuestions.length}`;
  await update(ref(db, `rooms/${roomCode}`), { phase:'question', currentQ:0 });
  await pushQuestion(0);
});

_registerFn('revealAnswer', async function() {
  clearInterval(timerInterval);
  const idx = currentQ;
  const q = gameQuestions[idx];
  phase = 'reveal';
  const answers = answersCache;
  const updates = {};
  const counts = [0,0,0,0];
  Object.values(answers).forEach(a => { if(a.answer !== undefined) counts[a.answer]++; });
  let correctPlayers = [];
  Object.entries(answers).forEach(([pid, data]) => {
    if (data.answer === q.a) {
      const speed = Math.max(0, TIMER_SECS - (data.timeTaken||TIMER_SECS));
      const pts = Math.round(POINTS_BASE * (0.5 + 0.5*(speed/TIMER_SECS)));
      updates[`rooms/${roomCode}/players/${pid}/score`] = (playersCache[pid]?.score||0) + pts;
      correctPlayers.push(pid);
    }
  });
  if (Object.keys(updates).length > 0) await update(ref(db), updates);
  await update(ref(db, `rooms/${roomCode}`), { phase:'reveal' });
  const letters = ['أ','ب','ج','د'];
  const total = counts.reduce((a,b)=>a+b,0);
  document.getElementById('q-area').innerHTML = `
    <div class="phase-badge">✅ الإجابة الصحيحة</div>
    <div class="q-card">
      <div class="q-meta"><span class="q-cat-tag">${q.c}</span></div>
      <div class="q-text">${q.q}</div>
    </div>
    <div class="opts-grid">
      ${q.o.map((opt,i)=>`
        <div class="opt-bar ${i===q.a?'correct':'wrong'}">
          <div class="fill-bg" style="width:${total>0?Math.round(counts[i]/total*100):0}%"></div>
          <div class="opt-letter">${letters[i]}</div>
          <div class="opt-text">${opt}</div>
          <div class="opt-count">${counts[i]} ${i===q.a?'✓':''}</div>
        </div>`).join('')}
    </div>
    <div style="text-align:center;padding:12px;color:var(--muted);font-size:14px">
      ${correctPlayers.length} من ${Object.keys(playersCache).length} أجابوا صح
    </div>
    <div class="btns-row">
      <div style="color:var(--muted);font-size:13px">الانتقال التلقائي خلال <span id="auto-count">4</span> ثانية…</div>
    </div>
  `;

  let autoSec = 4;
  const autoInt = setInterval(() => {
    autoSec--;
    const el = document.getElementById('auto-count');
    if (el) el.textContent = autoSec;
    if (autoSec <= 0) {
      clearInterval(autoInt);
      if (currentQ < gameQuestions.length - 1) window.nextQuestion();
      else window.finishGame();
    }
  }, 1000);
});



_registerFn('finishGame', async function() {
  clearInterval(timerInterval);
  await update(ref(db, `rooms/${roomCode}`), { phase:'final' });
  phase = 'final';
  const players = Object.entries(playersCache)
    .map(([id,p])=>({...p,id}))
    .sort((a,b)=>(b.score||0)-(a.score||0));
  const medals = ['🥈','🥇','🥉'];
  const top3 = [players[1],players[0],players[2]].filter(Boolean);
  // signal players to go to new game after 8 seconds
  setTimeout(async () => {
    const newRoom = Math.random().toString(36).substring(2,7).toUpperCase();
    await update(ref(db, `rooms/${roomCode}`), { nextRoom: newRoom });
  }, 8000);

  document.getElementById('q-area').innerHTML = `
    <div class="state-screen">
      <div class="big-icon">🏆</div>
      <div class="state-title">النتائج النهائية!</div>
      <div class="podium">
        ${top3.map((p,i)=>`
          <div class="podium-block">
            <div class="p-avatar podium-avatar" style="background:${p?.color||'#555'}">${p?.avatar||'👤'}</div>
            <div class="podium-name">${p?.name||'—'}</div>
            <div class="podium-score">${p?.score||0} نقطة</div>
            <div class="podium-stand">${medals[i]}</div>
          </div>`).join('')}
      </div>
      <div style="width:100%;max-width:500px">
        ${players.slice(0,10).map((p,i)=>`
          <div class="results-row">
            <div class="rank">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</div>
            <div class="p-avatar" style="background:${p.color||'#555'};width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center">${p.avatar||'👤'}</div>
            <div class="p-name" style="flex:1;font-weight:700;padding:0 8px">${p.name}</div>
            <div class="p-score">${p.score||0}</div>
          </div>`).join('')}
      </div>
      <div class="btns-row">
        <button class="btn btn-gold" onclick="location.reload()">🔄 جلسة جديدة</button>
      </div>
    </div>
  `;
});

init();

async function init() {
  roomCode = Math.random().toString(36).substring(2,7).toUpperCase();
  gameQuestions = shuffle(ALL_Q).slice(0, 25);

  await set(ref(db, `rooms/${roomCode}`), {
    phase: 'lobby',
    currentQ: -1,
    createdAt: Date.now(),
  });

  listenRoom();
  renderLobby();
}

/* ════════════════════════════════════
   LISTENERS
════════════════════════════════════ */
function listenRoom() {
  // players
  const pRef = ref(db, `rooms/${roomCode}/players`);
  onValue(pRef, snap => {
    playersCache = snap.val() || {};
    document.getElementById('stat-players').textContent = Object.keys(playersCache).length;
    renderPlayersSidebar();
    if (phase === 'lobby') renderLobby();
    if (phase === 'question') renderAnsweredCount();
    checkAutoStart();
  });
}

function listenAnswers(qIdx) {
  const aRef = ref(db, `rooms/${roomCode}/answers/${qIdx}`);
  onValue(aRef, snap => {
    answersCache = snap.val() || {};
    renderAnsweredCount();
    // Auto-reveal when ALL players have answered
    if (phase === 'question') {
      const totalPlayers = Object.keys(playersCache).length;
      const answeredCount = Object.keys(answersCache).length;
      if (totalPlayers > 0 && answeredCount >= totalPlayers) {
        // small delay so last answer registers visually
        setTimeout(() => {
          if (phase === 'question') window.revealAnswer();
        }, 800);
      }
    }
  });
}

/* ════════════════════════════════════
   LOBBY
════════════════════════════════════ */
function renderLobby() {
  phase = 'lobby';
  const playerLink = location.href
    .replace(/[?#].*$/, '')
    .replace(/musabaga_host\.html$/i, 'musabaga_player.html')
    + '?room=' + roomCode;
  const players = Object.entries(playersCache).sort((a,b)=>(a[1].joinedAt||0)-(b[1].joinedAt||0));
  const count = players.length;
  const autoVal = autoStartCount > 0 ? autoStartCount : '';

  document.getElementById('q-area').innerHTML = `
    <div class="state-screen">
      <div class="phase-badge">⏳ انتظار اللاعبين</div>
      <div class="room-code-big">${roomCode}</div>

      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center;margin-bottom:4px">
        <div class="join-url" style="font-size:15px;color:var(--text)">${playerLink}</div>
        <button class="btn btn-outline" onclick="copyLink('${playerLink}')">📋 نسخ الرابط</button>
      </div>

      <!-- Auto-start config -->
      <div style="display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:12px;padding:12px 18px;margin:8px 0">
        <span style="color:var(--muted);font-size:13px;white-space:nowrap">ابدأ تلقائياً عند وصول</span>
        <input type="number" id="auto-start-input" min="1" max="50" value="${autoVal}"
          placeholder="—"
          oninput="updateAutoStart(this.value)"
          style="width:64px;padding:6px 10px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:16px;font-weight:700;text-align:center;outline:none">
        <span style="color:var(--muted);font-size:13px">لاعب</span>
        ${autoStartCount>0 ? `<span style="color:var(--gold);font-size:12px;font-weight:700">مفعّل ✓</span>` : ''}
      </div>

      <!-- Players joined -->
      <div style="width:100%;max-width:500px;text-align:right">
        <div style="font-size:13px;color:var(--muted);margin-bottom:8px">
          ${count} لاعب انضم
          ${autoStartCount>0 ? `— ينتظر ${Math.max(0,autoStartCount-count)} لاعب إضافي للبدء التلقائي` : ''}
        </div>
        <div style="display:flex;flex-direction:column;gap:5px;max-height:200px;overflow-y:auto" id="lobby-players-list">
          ${players.map(([id,p],i)=>`
            <div style="display:flex;align-items:center;gap:8px;padding:7px 12px;background:var(--card);border:1px solid var(--border);border-radius:10px">
              <div style="width:28px;height:28px;border-radius:50%;background:${p.color||'#555'};display:flex;align-items:center;justify-content:center;font-size:13px">${p.avatar||'👤'}</div>
              <div style="font-size:14px;font-weight:700">${p.name}</div>
              <div style="margin-right:auto;font-size:11px;color:var(--muted)">#${i+1}</div>
            </div>`).join('')}
        </div>
      </div>

      ${autoStartCount>0&&count>=autoStartCount ? '' : `
      <div class="btns-row">
        <button class="btn btn-gold" onclick="startGame()" ${count<1?'disabled style="opacity:.5"':''}>
          🚀 ابدأ الآن
        </button>
      </div>`}
    </div>
  `;
  checkAutoStart();
}

window.updateAutoStart = function(val) {
  autoStartCount = parseInt(val) || 0;
  checkAutoStart();
};

function checkAutoStart() {
  if (phase !== 'lobby') return;
  if (autoStartCount <= 0) return;
  const count = Object.keys(playersCache).length;
  if (count >= autoStartCount) {
    window.startGame();
  }
}



/* ════════════════════════════════════
   START GAME
════════════════════════════════════ */


async function pushQuestion(idx) {
  const q = gameQuestions[idx];
  await set(ref(db, `rooms/${roomCode}/currentQuestion`), {
    idx, cat:q.c, text:q.q, options:q.o, correctAnswer:q.a, timeLimit:TIMER_SECS,
    startedAt: Date.now()
  });
  await remove(ref(db, `rooms/${roomCode}/answers/${idx}`));
  phase = 'question';
  answersCache = {};
  listenAnswers(idx);
  renderQuestion(idx);
}

/* ════════════════════════════════════
   QUESTION RENDER
════════════════════════════════════ */
function renderQuestion(idx) {
  const q = gameQuestions[idx];
  const letters = ['أ','ب','ج','د'];
  document.getElementById('stat-q').textContent = `${idx+1}/${gameQuestions.length}`;
  document.getElementById('q-area').innerHTML = `
    <div class="phase-badge">🎯 سؤال ${idx+1} من ${gameQuestions.length}</div>
    <div class="q-card">
      <div class="q-meta">
        <span class="q-cat-tag">${q.c}</span>
        <span class="q-num">س ${idx+1}</span>
      </div>
      <div class="q-text">${q.q}</div>
    </div>
    <div class="timer-wrap">
      <div class="timer-ring">
        <svg width="80" height="80"><circle class="bg" cx="40" cy="40" r="34" stroke-width="6"/><circle class="fill" id="timer-circle" cx="40" cy="40" r="34" stroke-width="6" stroke-dasharray="${2*Math.PI*34}" stroke-dashoffset="0"/></svg>
        <div class="timer-num" id="timer-num">${TIMER_SECS}</div>
      </div>
    </div>
    <div class="opts-grid" id="opts-grid">
      ${q.o.map((opt,i)=>`
        <div class="opt-bar" id="opt-${i}">
          <div class="fill-bg" id="fill-${i}" style="width:0%"></div>
          <div class="opt-letter">${letters[i]}</div>
          <div class="opt-text">${opt}</div>
          <div class="opt-count" id="cnt-${i}">0</div>
        </div>`).join('')}
    </div>
    <div class="btns-row">
      <button class="btn btn-red" onclick="revealAnswer()">⏩ كشف الإجابة</button>
    </div>
  `;
  startTimer(TIMER_SECS, idx);
}



function startTimer(secs, idx) {
  timerLeft = secs;
  clearInterval(timerInterval);
  const circumference = 2 * Math.PI * 34;
  timerInterval = setInterval(() => {
    timerLeft--;
    const el = document.getElementById('timer-num');
    const circle = document.getElementById('timer-circle');
    if (!el) { clearInterval(timerInterval); return; }
    el.textContent = timerLeft;
    const pct = timerLeft / secs;
    circle.style.strokeDashoffset = circumference * (1 - pct);
    if (timerLeft <= 5) { circle.style.stroke = '#ef4444'; el.style.color = '#ef4444'; }
    if (timerLeft <= 0) { clearInterval(timerInterval); revealAnswer(); }
    // update live answer counts
    updateLiveAnswerCounts(idx);
  }, 1000);
}

function updateLiveAnswerCounts(idx) {
  const answers = answersCache;
  const counts = [0,0,0,0];
  Object.values(answers).forEach(a => { if(a.answer !== undefined) counts[a.answer]++; });
  counts.forEach((c,i)=>{
    const el = document.getElementById(`cnt-${i}`);
    if(el) el.textContent = c;
    const total = counts.reduce((a,b)=>a+b,0);
    const fill = document.getElementById(`fill-${i}`);
    if(fill) fill.style.width = total>0 ? (c/total*100)+'%' : '0%';
  });
}










_registerFn('nextQuestion', async function() {
  currentQ++;
  await update(ref(db, `rooms/${roomCode}`), { phase:'question', currentQ });
  await pushQuestion(currentQ);
});

/* ════════════════════════════════════
   SIDEBAR
════════════════════════════════════ */
function renderPlayersSidebar() {
  const list = document.getElementById('players-list');
  if (!list) return;
  const players = Object.entries(playersCache)
    .map(([id,p])=>({...p,id}))
    .sort((a,b)=>(b.score||0)-(a.score||0));
  list.innerHTML = players.map((p,i)=>`
    <div class="player-row">
      <div class="p-rank">${i+1}</div>
      <div class="p-avatar" style="background:${p.color||'#555'};width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px">${p.avatar||'👤'}</div>
      <div class="p-info">
        <div class="name">${p.name||'—'}</div>
        <div class="score">${p.score||0} نقطة</div>
      </div>
      <div class="p-answered ${answersCache[p.id]?'yes':''}"></div>
    </div>
  `).join('') || '<div style="color:var(--muted);font-size:13px;text-align:center;padding:16px">لا يوجد لاعبون بعد</div>';
}

function renderAnsweredCount() {
  const el = document.getElementById('answered-count');
  if (!el || phase !== 'question') return;
  const total = Object.keys(playersCache).length;
  const answered = Object.keys(answersCache).length;
  el.textContent = `أجاب ${answered} من ${total}`;
  renderPlayersSidebar();
}
</script>
